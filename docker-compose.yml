services:
  api:
    build: .
    image: api-clinica-vidas:latest
    container_name: api-clinica-vidas
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      # Sobrescreve o caminho do cache para apontar pro volume persistente
      CACHE_LOTE_PATH: /app/data/cache-lote.json
    volumes:
      - cache-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  cache-data:
